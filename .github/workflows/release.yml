name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build exu.dll
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution
        run: msbuild ExtraUtilities.sln /p:Configuration=Release /p:Platform=x86

      - name: Verify DLL Output
        shell: pwsh
        run: |
          if (!(Test-Path "Release/exu.dll")) {
            throw "exu.dll was not built!"
          }

      - name: Release DLL
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Release/exu.dll
            Release/exu.pdb
          generate_release_notes: true
