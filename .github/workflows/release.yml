name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build exu.dll
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout Ogre 1.10.0 headers
        shell: pwsh
        run: |
          # OgreNativeFontBridge.cpp includes <OgreFont.h>, <OgreFontManager.h>, etc.
          # The vcxproj resolves these from $(ProjectDir)..\ogre-1.10.0\...
          # so the headers must land in a sibling directory of the workspace.
          # Commit hash from OgreSceneManagerShim.h (tag v1.10.0 = f1f1937).
          $ogreDir = Join-Path (Split-Path "${{ github.workspace }}") "ogre-1.10.0"
          git clone --filter=blob:none --no-checkout `
            https://github.com/OGRECave/ogre.git $ogreDir
          git -C $ogreDir sparse-checkout init --cone
          git -C $ogreDir sparse-checkout set OgreMain/include Components/Overlay/include
          git -C $ogreDir checkout f1f1937fd6cbad05a4b9170b9882da91f42f53a5

      - name: Add MSBuild to PATH
        uses: microsoft/setup-msbuild@v2

      - name: Build Solution
        run: msbuild ExtraUtilities.sln /p:Configuration=Release /p:Platform=x86

      - name: Verify DLL Output
        shell: pwsh
        run: |
          if (!(Test-Path "Release/exu.dll")) {
            throw "exu.dll was not built!"
          }

      - name: Release DLL
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            Release/exu.dll
            Release/exu.pdb
          generate_release_notes: true
